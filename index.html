<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>사르르목장 · 디자인 아카이브</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  /* 정본 A(2021 라인아트) 실측 팔레트 */
  --navy:#38528a;          /* 브랜드 네이비 — 메인로고 픽셀 실측 */
  --navy-d:#2a3f6e;
  --navy-l:#7186b3;
  --green:#3f9c5a;         /* 보조 그린 — ⚠잠정값(.ai 소스 실측 전) */
  --cream:#f4f1ea;
  --paper:#fbfaf7;
  --line:#dcd6c9;
  --ink:#2f3436;
  --ink-2:#7c8287;
  --serif:'Gowun Batang',serif;
  --sans:'Pretendard Variable',Pretendard,sans-serif;
  --latin:'Fredoka',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--cream); color:var(--ink); font-family:var(--sans);
  font-size:15px; line-height:1.7; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 1px 1px, rgba(56,82,138,.055) 1px, transparent 0);
  background-size:26px 26px;
}
.hide{display:none!important}
a{color:inherit}
::selection{background:var(--navy); color:var(--cream)}

/* ── 로그인 ── */
#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.lcard{
  background:var(--paper); border:1px solid var(--line); border-radius:2px;
  padding:56px 48px; max-width:420px; width:100%; text-align:center;
  box-shadow:0 1px 0 var(--line), 0 24px 60px -32px rgba(42,63,110,.4);
}
.lcard img{width:104px;height:104px;object-fit:contain;margin-bottom:22px}
.lcard h1{font-family:var(--serif);font-size:25px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.lcard .sub{font-family:var(--latin);font-size:10px;letter-spacing:.22em;color:var(--navy-l);margin-top:9px;text-transform:uppercase}
.lcard p{font-size:13px;color:var(--ink-2);margin:20px 0 26px;line-height:1.75}
.btn{
  font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;
  background:var(--navy);color:#fff;border:0;border-radius:2px;padding:13px 26px;width:100%;
  transition:background .18s ease, transform .18s ease;
}
.btn:hover:not(:disabled){background:var(--navy-d);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default}
#lmsg{font-size:12px;color:var(--ink-2);margin-top:14px;min-height:16px}

/* ── 헤더 ── */
header{
  border-bottom:1px solid var(--line); background:var(--paper);
  position:sticky; top:0; z-index:50;
}
.hin{max-width:1180px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;gap:16px}
.hin img{width:42px;height:42px;object-fit:contain}
.htxt h1{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--navy);line-height:1.2}
.htxt .sub{font-family:var(--latin);font-size:9px;letter-spacing:.2em;color:var(--navy-l);text-transform:uppercase;margin-top:2px}
.hsp{flex:1}
.who{font-size:12px;color:var(--ink-2);font-family:var(--latin)}
.lo{font-size:12px;background:none;border:1px solid var(--line);border-radius:2px;padding:7px 13px;cursor:pointer;color:var(--ink-2);font-family:var(--sans)}
.lo:hover{border-color:var(--navy);color:var(--navy)}

/* ── 히어로 ── */
.hero{max-width:1180px;margin:0 auto;padding:64px 32px 40px}
.hero .kick{font-family:var(--latin);font-size:10px;letter-spacing:.24em;color:var(--green);text-transform:uppercase;font-weight:600}
.hero h2{font-family:var(--serif);font-size:clamp(30px,4.6vw,46px);font-weight:700;color:var(--navy);line-height:1.28;margin:14px 0 0;letter-spacing:-.02em}
.hero .lede{font-size:14.5px;color:var(--ink-2);max-width:660px;margin-top:18px;line-height:1.85}
.hero .lede b{color:var(--navy);font-weight:600}
.stats{display:flex;gap:44px;margin-top:38px;flex-wrap:wrap}
.stat .n{font-family:var(--latin);font-size:31px;font-weight:600;color:var(--navy);line-height:1}
.stat .l{font-size:11px;color:var(--ink-2);margin-top:6px;letter-spacing:.04em}

/* ── 목차 ── */
.toc{max-width:1180px;margin:0 auto;padding:0 32px 56px}
.rule{display:flex;align-items:center;gap:14px;margin:0 0 26px}
.rule .lbl{font-family:var(--latin);font-size:10px;letter-spacing:.2em;color:var(--navy);text-transform:uppercase;font-weight:600;white-space:nowrap}
.rule .ln{flex:1;height:1px;background:var(--line)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
@media(max-width:1000px){.tgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.tgrid{grid-template-columns:1fr}}
.tcard{
  background:var(--paper); padding:24px 22px 20px; text-decoration:none; display:block;
  transition:background .2s ease; position:relative;
}
.tcard:hover{background:#fff}
.tcard:hover .tno{color:var(--green)}
.tno{font-family:var(--latin);font-size:26px;font-weight:600;color:var(--navy-l);line-height:1;transition:color .2s ease}
.tcard h3{font-family:var(--serif);font-size:16.5px;font-weight:700;color:var(--navy);margin:11px 0 7px}
.tcard p{font-size:12.5px;color:var(--ink-2);line-height:1.65;min-height:42px}
.tmeta{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.cnt{font-family:var(--latin);font-size:11px;color:var(--ink-2)}
.pri{font-size:9.5px;letter-spacing:.08em;padding:3px 7px;border-radius:2px;font-weight:600}
.pri.p1{background:var(--green);color:#fff}
.pri.p0{background:var(--navy);color:#fff}
.pri.px{background:var(--cream);color:var(--ink-2);border:1px solid var(--line)}

/* ── 필터 ── */
.fbar{max-width:1180px;margin:0 auto;padding:0 32px 22px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fbar .flabel{font-size:11px;color:var(--ink-2);margin-right:5px;letter-spacing:.05em}
.chip{
  font-family:var(--sans);font-size:11.5px;background:var(--paper);border:1px solid var(--line);
  border-radius:2px;padding:5px 11px;cursor:pointer;color:var(--ink-2);transition:all .15s ease;
}
.chip:hover{border-color:var(--navy-l);color:var(--navy)}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* ── 섹션 ── */
section{max-width:1180px;margin:0 auto;padding:0 32px 60px;scroll-margin-top:78px}
.shead{display:flex;align-items:flex-end;gap:16px;padding-bottom:16px;border-bottom:2px solid var(--navy)}
.shead .no{font-family:var(--latin);font-size:44px;font-weight:600;color:var(--navy-l);line-height:.9}
.shead h3{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.shead .d{font-size:12.5px;color:var(--ink-2);margin-top:4px}
.shead .sp{flex:1}
.sub-h{
  font-family:var(--serif);font-size:14px;font-weight:700;color:var(--navy);
  margin:30px 0 0;padding:9px 0 8px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:9px;
}
.sub-h .gram{font-family:var(--sans);font-size:11px;font-weight:400;color:var(--ink-2)}

/* ── 아이템 테이블 ── */
.items{margin-top:4px}
.row{
  display:grid;grid-template-columns:1fr 78px 96px 132px;gap:14px;align-items:center;
  padding:11px 4px;border-bottom:1px solid var(--line);transition:background .15s ease;
}
.row:hover{background:var(--paper)}
.row .t{font-size:13.5px;color:var(--ink);line-height:1.45}
.row .t .fmt{
  font-family:var(--latin);font-size:9px;letter-spacing:.06em;color:var(--navy);
  background:rgba(56,82,138,.09);padding:2px 6px;border-radius:2px;margin-right:7px;vertical-align:1px;
}
.row .dt{font-family:var(--latin);font-size:11px;color:var(--ink-2)}
.row .st{font-size:10px;letter-spacing:.06em;color:var(--ink-2);text-align:center}
.row .st.after{color:var(--green);font-weight:600}
.links{display:flex;gap:6px;justify-content:flex-end}
.lk{
  font-family:var(--latin);font-size:10px;letter-spacing:.05em;text-decoration:none;
  border:1px solid var(--line);border-radius:2px;padding:4px 9px;color:var(--ink-2);
  transition:all .15s ease;white-space:nowrap;
}
.lk.before:hover{border-color:var(--navy);color:var(--navy);background:#fff}
.lk.after{border-style:dashed;opacity:.45;pointer-events:none}
.lk.after.live{border-style:solid;opacity:1;border-color:var(--green);color:var(--green);pointer-events:auto}
.lk.after.live:hover{background:var(--green);color:#fff}

/* ── 노트 ── */
.note{
  background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--green);
  padding:14px 18px;margin:22px 0 0;font-size:12.5px;color:var(--ink-2);line-height:1.75;border-radius:0 2px 2px 0;
}
.note b{color:var(--navy)}

footer{border-top:1px solid var(--line);background:var(--paper);margin-top:20px}
.fin{max-width:1180px;margin:0 auto;padding:26px 32px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:11.5px;color:var(--ink-2)}
.fin .sp{flex:1}
.fin code{font-family:var(--latin);font-size:11px;color:var(--navy)}

#denied{max-width:520px;margin:90px auto;text-align:center;padding:0 24px}
#denied h2{font-family:var(--serif);font-size:22px;color:var(--navy);margin-bottom:10px}
#denied p{font-size:13px;color:var(--ink-2)}

@media(max-width:760px){
  .hin,.hero,.toc,section,.fbar,.fin{padding-left:18px;padding-right:18px}
  .row{grid-template-columns:1fr;gap:6px;padding:13px 4px}
  .links{justify-content:flex-start}
  .row .st{text-align:left}
  .shead{flex-wrap:wrap;gap:10px}
}
</style></head>

// ── 렌더 ──
const allItems=c=>c.subs?c.subs.flatMap(s=>s.items):c.items;
const esc=s=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

function rowHTML(it){
  const url=it.fd?F(it.b):D(it.b);
  const after=it.a
    ? `<a class="lk after live" href="${it.a}" target="_blank" rel="noopener">애프터 ↗</a>`
    : `<span class="lk after">애프터 준비중</span>`;
  return `<div class="row" data-f="${esc(it.f)}">
    <div class="t"><span class="fmt">${esc(it.f)}</span>${esc(it.t)}</div>
    <div class="dt">${esc(it.d)}</div>
    <div class="st ${it.st==='애프터'?'after':''}">${esc(it.st)}</div>
    <div class="links">
      <a class="lk before" href="${url}" target="_blank" rel="noopener">비포 ↗</a>${after}
    </div>
  </div>`;
}

function renderApp(){
  const total=CATS.reduce((n,c)=>n+allItems(c).length,0);
  const done=CATS.reduce((n,c)=>n+allItems(c).filter(i=>i.st==='애프터').length,0);
  const fmts=[...new Set(CATS.flatMap(c=>allItems(c).map(i=>i.f)))].sort();

  const hero=`<div class="hero">
    <div class="kick">Design Archive · v1</div>
    <h2>흩어진 작업물을,<br>하나의 체계로.</h2>
    <p class="lede">2022년부터 4년간 그때그때 만들어온 디자인 작업물을 <b>기능 기준으로 분류</b>하고, 각 항목의 <b>현재 원본(비포)</b>과 <b>개선본(애프터)</b>을 나란히 추적합니다. 정본은 <b>2021 STUDIO FLAT FLAG 라인아트(정본 A)</b>입니다.</p>
    <div class="stats">
      <div class="stat"><div class="n">${total}</div><div class="l">등록 작업물</div></div>
      <div class="stat"><div class="n">6</div><div class="l">카테고리</div></div>
      <div class="stat"><div class="n">${done}</div><div class="l">개선 완료</div></div>
      <div class="stat"><div class="n">4<span style="font-size:16px">년</span></div><div class="l">아카이브 기간 (2022–2026)</div></div>
    </div>
  </div>`;

  const toc=`<div class="toc">
    <div class="rule"><span class="lbl">목차 · Index</span><span class="ln"></span></div>
    <div class="tgrid">${CATS.map(c=>`
      <a class="tcard" href="#${c.id}">
        <div class="tno">${c.no}</div>
        <h3>${esc(c.name)}</h3>
        <p>${esc(c.desc)}</p>
        <div class="tmeta">
          <span class="pri ${c.prik}">${esc(c.pri)}</span>
          <span class="cnt">${allItems(c).length}건</span>
        </div>
      </a>`).join('')}</div>
  </div>`;

  const fbar=`<div class="fbar">
    <span class="flabel">형식</span>
    <button class="chip on" data-fx="*">전체</button>
    ${fmts.map(f=>`<button class="chip" data-fx="${esc(f)}">${esc(f)}</button>`).join('')}
  </div>`;

  const secs=CATS.map(c=>`
    <section id="${c.id}">
      <div class="shead">
        <span class="no">${c.no}</span>
        <div><h3>${esc(c.name)}</h3><div class="d">${esc(c.desc)}</div></div>
        <span class="sp"></span>
        <span class="pri ${c.prik}">${esc(c.pri)}</span>
      </div>
      ${c.note?`<div class="note">${c.note}</div>`:''}
      ${c.subs
        ? c.subs.map(s=>`<div class="sub-h">${esc(s.n)}<span class="gram">— ${esc(s.g)}</span></div>
            <div class="items">${s.items.map(rowHTML).join('')}</div>`).join('')
        : `<div class="items" style="margin-top:18px">${c.items.map(rowHTML).join('')}</div>`}
    </section>`).join('');

  const foot=`<footer><div class="fin">
    <span>사르르목장 · 디자인 아카이브 — 관리 전용</span>
    <span class="sp"></span>
    <span>정본 A · 네이비 <code>#38528a</code></span>
    <span>분류 정본: <code>saruru-design/ARCHIVE-TAXONOMY.md</code></span>
  </div></footer>`;

  $('app').innerHTML=hero+toc+fbar+secs+foot;

  // 형식 필터
  $('app').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
    $('app').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    ch.classList.add('on');
    const f=ch.dataset.fx;
    $('app').querySelectorAll('.row').forEach(r=>{
      r.style.display=(f==='*'||r.dataset.f===f)?'':'none';
    });
    // 빈 섹션·서브헤딩 숨김
    $('app').querySelectorAll('section').forEach(s=>{
      const vis=[...s.querySelectorAll('.row')].some(r=>r.style.display!=='none');
      s.style.display=vis?'':'none';
    });
    $('app').querySelectorAll('.sub-h').forEach(sh=>{
      const box=sh.nextElementSibling;
      const vis=box&&[...box.querySelectorAll('.row')].some(r=>r.style.display!=='none');
      sh.style.display=vis?'':'none'; if(box) box.style.display=vis?'':'none';
    });
  });
}
</script>
