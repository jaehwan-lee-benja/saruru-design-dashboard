<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>사르르목장 · 디자인 아카이브</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#38528a;   /* RGB 정본 — 인쇄용 메인로고 PNG 실측. ⚠인쇄 CMYK는 미확정(네이비 CMYK가 2개) */
  --navy-d:#2a3f6e; --navy-l:#7186b3;
  --green:#45bc51;  /* 보조 그린 — 강조 전용, 남발 금지 */
  --cream:#f5f3ef;  /* 패널/구획용 보조 배경. ※브랜드 기본 지면은 화이트 */
  --paper:#ffffff; --line:#dfdbd2; --ink:#2f3436; --ink-2:#7c8287; --red:#e0483c;
  --serif:'Gowun Batang',serif; --sans:'Pretendard Variable',Pretendard,sans-serif; --latin:'Fredoka',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.7;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 1px 1px, rgba(56,82,138,.055) 1px, transparent 0);background-size:26px 26px}
.hide{display:none!important}
a{color:inherit}
::selection{background:var(--navy);color:#fff}

#login{min-height:100vh;display:grid;place-items:center;padding:24px}
.lcard{background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:56px 48px;max-width:420px;width:100%;
  text-align:center;box-shadow:0 1px 0 var(--line),0 24px 60px -32px rgba(42,63,110,.4)}
.lcard img{width:104px;height:104px;object-fit:contain;margin-bottom:22px}
.lcard h1{font-family:var(--serif);font-size:25px;font-weight:700;color:var(--navy)}
.lcard .sub{font-family:var(--latin);font-size:10px;letter-spacing:.22em;color:var(--navy-l);margin-top:9px;text-transform:uppercase}
.lcard p{font-size:13px;color:var(--ink-2);margin:20px 0 26px;line-height:1.75}
.btn{font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;background:var(--navy);color:#fff;border:0;
  border-radius:2px;padding:13px 26px;width:100%;transition:background .18s,transform .18s}
.btn:hover:not(:disabled){background:var(--navy-d);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default}
#lmsg{font-size:12px;color:var(--ink-2);margin-top:14px;min-height:16px}

header{border-bottom:1px solid var(--line);background:var(--paper);position:sticky;top:0;z-index:50}
.hin{max-width:1240px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:14px}
.hin img{width:40px;height:40px;object-fit:contain}
.htxt h1{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--navy);line-height:1.2}
.htxt .sub{font-family:var(--latin);font-size:9px;letter-spacing:.2em;color:var(--navy-l);text-transform:uppercase}
.hsp{flex:1}
.who{font-size:12px;color:var(--ink-2);font-family:var(--latin)}
.lo{font-size:12px;background:none;border:1px solid var(--line);border-radius:2px;padding:7px 13px;cursor:pointer;color:var(--ink-2);font-family:var(--sans)}
.lo:hover{border-color:var(--navy);color:var(--navy)}

.hero{max-width:1240px;margin:0 auto;padding:60px 32px 34px}
.kick{font-family:var(--latin);font-size:10px;letter-spacing:.24em;color:var(--green);text-transform:uppercase;font-weight:600}
.hero h2{font-family:var(--serif);font-size:clamp(29px,4.4vw,44px);font-weight:700;color:var(--navy);line-height:1.28;margin-top:13px;letter-spacing:-.02em}
.hero .lede{font-size:14.5px;color:var(--ink-2);max-width:690px;margin-top:17px;line-height:1.85}
.hero .lede b{color:var(--navy);font-weight:600}
.stats{display:flex;gap:40px;margin-top:34px;flex-wrap:wrap}
.stat .n{font-family:var(--latin);font-size:30px;font-weight:600;color:var(--navy);line-height:1}
.stat .l{font-size:11px;color:var(--ink-2);margin-top:5px}

.wrap{max-width:1240px;margin:0 auto;padding:0 32px}
.rule{display:flex;align-items:center;gap:14px;margin:0 0 22px}
.rule .lbl{font-family:var(--latin);font-size:10px;letter-spacing:.2em;color:var(--navy);text-transform:uppercase;font-weight:600;white-space:nowrap}
.rule .ln{flex:1;height:1px;background:var(--line)}

/* 목차 */
.catblock{margin-bottom:34px}
.cathead{display:flex;align-items:baseline;gap:11px;margin-bottom:11px}
.cathead .k{font-family:var(--latin);font-size:20px;font-weight:600;color:var(--navy-l)}
.cathead h3{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--navy)}
.cathead .d{font-size:12px;color:var(--ink-2)}
.cathead .sp{flex:1}
.pri{font-size:9.5px;letter-spacing:.08em;padding:3px 7px;border-radius:2px;font-weight:600;white-space:nowrap}
.pri.p1{background:var(--green);color:#fff}
.pri.p0{background:var(--navy);color:#fff}
.pri.px{background:var(--cream);color:var(--ink-2);border:1px solid var(--line)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}
.tcard{background:var(--paper);padding:15px 16px 13px;text-decoration:none;display:block;transition:background .18s;cursor:pointer;text-align:left;border:0;font-family:inherit;width:100%}
.tcard:hover{background:#fcfbf9}
.tcard:hover .tid{color:var(--green)}
.tid{font-family:var(--latin);font-size:10px;letter-spacing:.1em;color:var(--navy-l);font-weight:600;transition:color .18s}
.tcard h4{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--navy);margin:5px 0 4px}
.tcard .td{font-size:11.5px;color:var(--ink-2);line-height:1.55;min-height:34px}
.tm{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-family:var(--latin);font-size:10px;color:var(--ink-2)}
.tm .cur{color:var(--green);font-weight:600}
.xb{font-size:9px;color:var(--navy-l);font-family:var(--latin);letter-spacing:.05em}

/* 주제 상세 */
.det{max-width:1240px;margin:0 auto;padding:0 32px 70px}
.dhead{display:flex;align-items:flex-end;gap:15px;padding-bottom:14px;border-bottom:2px solid var(--navy)}
.dhead .id{font-family:var(--latin);font-size:13px;letter-spacing:.12em;color:var(--navy-l);font-weight:600}
.dhead h3{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.01em;line-height:1.2}
.dhead .d{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.dhead .sp{flex:1}
.backlink{font-size:12px;text-decoration:none;border:1px solid var(--line);border-radius:2px;padding:7px 13px;color:var(--ink-2);white-space:nowrap;background:var(--paper)}
.backlink:hover{border-color:var(--navy);color:var(--navy)}

.xref{margin-top:16px;font-size:12.5px;color:var(--ink-2);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.xref .lb{font-weight:600;color:var(--navy)}
.xchip{font-size:11.5px;border:1px solid var(--line);border-radius:2px;padding:3px 9px;background:var(--paper);cursor:pointer;color:var(--ink-2);font-family:var(--sans)}
.xchip:hover{border-color:var(--green);color:var(--green)}

.asset{margin-top:26px}
.ahead{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--navy);padding:8px 0 7px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.ahead .vc{font-family:var(--latin);font-size:10px;color:var(--ink-2);font-weight:400}
.vrow{display:grid;grid-template-columns:104px 1fr 196px;gap:14px;align-items:center;padding:9px 4px;border-bottom:1px solid var(--line);transition:background .15s}
.vrow:hover{background:var(--paper)}
.vrow.old{opacity:.62}
.vt{display:flex;align-items:baseline;gap:7px}
.vnum{font-family:var(--latin);font-size:12px;font-weight:600;color:var(--navy)}
.vdate{font-family:var(--latin);font-size:11px;color:var(--ink-2)}
.cur-b{font-size:8.5px;letter-spacing:.06em;background:var(--green);color:#fff;padding:2px 5px;border-radius:2px;font-weight:600}
.vmeta{font-size:12.5px;color:var(--ink-2);line-height:1.45}
.fmt{font-family:var(--latin);font-size:9px;letter-spacing:.06em;color:var(--navy);background:rgba(56,82,138,.09);padding:2px 6px;border-radius:2px;margin-right:7px}
.vmeta .warn{color:var(--red);font-weight:600}
.vmeta .star{color:var(--green);font-weight:600}
.vlinks{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.lk{font-family:var(--latin);font-size:10px;letter-spacing:.04em;text-decoration:none;border:1px solid var(--line);
  border-radius:2px;padding:4px 8px;color:var(--ink-2);white-space:nowrap;background:var(--paper)}
.lk:hover{border-color:var(--navy);color:var(--navy)}
.lk.pdf{border-style:dotted}
.lk.after{border-style:dashed;opacity:.4;pointer-events:none}
.lk.after.live{border-style:solid;opacity:1;border-color:var(--green);color:var(--green);pointer-events:auto}
.lk.after.live:hover{background:var(--green);color:#fff}

.note{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--green);padding:14px 18px;margin:18px 0 0;
  font-size:12.8px;color:var(--ink-2);line-height:1.78;border-radius:0 2px 2px 0}
.note b{color:var(--navy)}
.note.warn{border-left-color:var(--red)}

footer{border-top:1px solid var(--line);background:var(--paper);margin-top:20px}
.fin{max-width:1240px;margin:0 auto;padding:24px 32px;display:flex;gap:15px;flex-wrap:wrap;align-items:center;font-size:11.5px;color:var(--ink-2)}
.fin .sp{flex:1}
.fin code{font-family:var(--latin);color:var(--navy)}
#denied{max-width:520px;margin:90px auto;text-align:center;padding:0 24px}
#denied h2{font-family:var(--serif);font-size:22px;color:var(--navy);margin-bottom:10px}

@media(max-width:760px){
  .hin,.hero,.wrap,.det,.fin{padding-left:18px;padding-right:18px}
  .vrow{grid-template-columns:1fr;gap:5px}
  .vlinks{justify-content:flex-start}
  .dhead{flex-wrap:wrap}
}
</style></head>
<body>

<div id="login">
  <div class="lcard">
    <img src="assets/logo.png" alt="사르르목장">
    <h1>디자인 아카이브</h1>
    <div class="sub">Saruru Farm · Design Archive</div>
    <p>사르르목장 디자인 작업물 아카이빙·개선 관리 대시보드입니다.<br>등록된 관리자 계정만 열람할 수 있습니다.</p>
    <button class="btn" id="gbtn">Google 계정으로 로그인</button>
    <div id="lmsg"></div>
  </div>
</div>

<div id="appwrap" class="hide">
  <header><div class="hin">
    <img src="assets/logo.png" alt="">
    <div class="htxt"><h1>디자인 아카이브</h1><div class="sub">Saruru Farm · Design Archive</div></div>
    <div class="hsp"></div>
    <span class="who" id="who"></span>
    <button class="lo" id="logout">로그아웃</button>
  </div></header>
  <div id="app"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topics.js"></script>
<script>
const SB_URL='https://rstazttwlghsorpzsugy.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdGF6dHR3bGdoc29ycHpzdWd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjI4NjAsImV4cCI6MjA5ODY5ODg2MH0.B5zrWLpG5vOFISWQeM8pD3UPBTYPHcmqYkD7rFBN6JM';
const ALLOW=['designerbenja@gmail.com','kbl0226@gmail.com'];
const sb=supabase.createClient(SB_URL,SB_ANON);
const $=id=>document.getElementById(id);

$('gbtn').onclick=()=>{ $('gbtn').disabled=true; $('lmsg').textContent='Google로 이동 중…';
  sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})
    .then(({error})=>{ if(error){ $('gbtn').disabled=false; $('lmsg').textContent='오류: '+error.message; }}); };
$('logout').onclick=()=>sb.auth.signOut();
function gate(s){
  if(s){ $('login').classList.add('hide'); $('appwrap').classList.remove('hide'); $('who').textContent=s.user.email;
    if(ALLOW.includes((s.user.email||'').toLowerCase())) route();
    else $('app').innerHTML='<div id="denied"><h2>열람 권한이 없습니다</h2><p>등록된 관리자 계정으로 로그인하세요.</p></div>';
  } else { $('appwrap').classList.add('hide'); $('login').classList.remove('hide'); $('gbtn').disabled=false; $('lmsg').textContent=''; }
}
(async()=>{ const {data:{session}}=await sb.auth.getSession(); gate(session);
  sb.auth.onAuthStateChange((_e,s)=>gate(s)); })();

// ── helpers ──
const D=id=>'https://drive.google.com/file/d/'+id+'/view';
const F=id=>'https://drive.google.com/drive/folders/'+id;
const S=id=>'https://docs.google.com/spreadsheets/d/'+id+'/edit';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const T=id=>TOPICS.find(t=>t.id===id);
const allV=t=>t.as.flatMap(a=>a.v);
const latest=t=>allV(t).map(v=>v.d).filter(d=>d&&d!=='—').sort().pop()||'—';
const url=v=>v.fd===1?F(v.id):v.fd===2?S(v.id):D(v.id);
// 에셋 내 버전 번호: 날짜 오름차순으로 v1..vN (날짜 없으면 번호 없음)
function numbered(a){
  const dated=a.v.filter(v=>v.d&&v.d!=='—').slice().sort((x,y)=>x.d<y.d?-1:1);
  const map=new Map(); dated.forEach((v,i)=>map.set(v,i+1));
  const newest=dated[dated.length-1];
  return a.v.map(v=>({v,n:map.get(v)||null,cur:v===newest}));
}
function markNote(s){
  if(!s) return '';
  let h=esc(s);
  h=h.replace(/⚠([^·]*)/g,'<span class="warn">⚠$1</span>');
  h=h.replace(/★([^·]*)/g,'<span class="star">★$1</span>');
  return h;
}

// ── 목차 ──
function renderIndex(){
  const nT=TOPICS.length;
  const nA=TOPICS.reduce((n,t)=>n+t.as.length,0);
  const nV=TOPICS.reduce((n,t)=>n+allV(t).length,0);
  const nX=TOPICS.reduce((n,t)=>n+(t.x?t.x.length:0),0);

  const hero=`<div class="hero">
    <div class="kick">Design Archive · v2 · 주제 단위</div>
    <h2>파일이 아니라,<br>주제로 묶는다.</h2>
    <p class="lede">한 파일에 여러 주제가 섞여 있고(<b>화장실·정수기·반납대·야외석이 한 장</b>), 한 주제가 여러 파일에 흩어져 있다. 그래서 파일이 아니라 <b>주제 단위로 재조립</b>하고 <b>버전으로 이력을 세운다</b>. 정본은 <b>2021 라인아트(정본 A)</b>.</p>
    <div class="stats">
      <div class="stat"><div class="n">${nT}</div><div class="l">주제</div></div>
      <div class="stat"><div class="n">${nA}</div><div class="l">에셋</div></div>
      <div class="stat"><div class="n">${nV}</div><div class="l">버전</div></div>
      <div class="stat"><div class="n">${nX}</div><div class="l">교차 연결</div></div>
    </div>
  </div>`;

  const cats=Object.keys(CATS).map(k=>{
    const c=CATS[k], ts=TOPICS.filter(t=>t.c===k);
    return `<div class="catblock">
      <div class="cathead">
        <span class="k">${k}</span>
        <h3>${esc(c.name)}</h3>
        <span class="d">${esc(c.desc)}</span>
        <span class="sp"></span>
        <span class="pri ${c.prik}">${esc(c.pri)}</span>
      </div>
      <div class="tgrid">${ts.map(t=>`
        <button class="tcard" data-go="${t.id}">
          <div class="tid">${t.id}</div>
          <h4>${esc(t.n)}</h4>
          <div class="td">${esc(t.d)}</div>
          <div class="tm">
            <span>${t.as.length}에셋 · ${allV(t).length}버전</span>
            <span class="cur">${esc(latest(t))}</span>
            ${t.x&&t.x.length?`<span class="sp" style="flex:1"></span><span class="xb">↔${t.x.length}</span>`:''}
          </div>
        </button>`).join('')}</div>
    </div>`;
  }).join('');

  const foot=`<footer><div class="fin">
    <span>사르르목장 · 디자인 아카이브 — 관리 전용</span><span class="sp"></span>
    <span>정본 A · <code>#38528a</code></span>
    <span>분류 정본: <code>saruru-design/ARCHIVE-TOPICS.md</code></span>
  </div></footer>`;

  $('app').innerHTML=hero+`<div class="wrap"><div class="rule"><span class="lbl">주제 목차 · Topics</span><span class="ln"></span></div>${cats}</div>`+foot;
  bind();
}

// ── 주제 상세 ──
function renderTopic(id){
  const t=T(id); if(!t){ location.hash=''; return; }
  const c=CATS[t.c];
  const assets=t.as.map(a=>{
    const rows=numbered(a).map(({v,n,cur})=>{
      const links=[];
      if(v.id) links.push(`<a class="lk" href="${url(v)}" target="_blank" rel="noopener">비포 ↗</a>`);
      if(v.pdf) links.push(`<a class="lk pdf" href="${D(v.pdf)}" target="_blank" rel="noopener">PDF ↗</a>`);
      links.push(v.after?`<a class="lk after live" href="${v.after}" target="_blank" rel="noopener">애프터 ↗</a>`
                       :`<span class="lk after">애프터 준비중</span>`);
      return `<div class="vrow ${cur?'':'old'}">
        <div class="vt">
          ${n?`<span class="vnum">v${n}</span>`:''}
          <span class="vdate">${esc(v.d)}</span>
          ${cur?'<span class="cur-b">현행</span>':''}
        </div>
        <div class="vmeta"><span class="fmt">${esc(v.f)}</span>${markNote(v.note)||'<span style="opacity:.4">—</span>'}</div>
        <div class="vlinks">${links.join('')}</div>
      </div>`;
    }).join('');
    return `<div class="asset">
      <div class="ahead">${esc(a.a)}<span class="vc">${a.v.length}버전</span></div>
      ${rows}
    </div>`;
  }).join('');

  const xr=t.x&&t.x.length?`<div class="xref">
      <span class="lb">교차 주제</span>
      ${t.x.map(x=>{const o=T(x);return o?`<button class="xchip" data-go="${x}">${x} ${esc(o.n)}</button>`:''}).join('')}
      <span style="font-size:11.5px;opacity:.8">— 이 주제를 고치면 위 주제도 함께 봐야 합니다</span>
    </div>`:'';

  const note = t.id==='A16'
    ? `<div class="note warn"><b>★통합본 — 개선 시 최대 함정.</b> 이 주제는 다른 주제들을 한 장에 모은 것입니다. 개별 사인만 고치고 <b>이 통합본을 빠뜨리면 매장에 구·신 두 버전이 동시에 붙습니다.</b> 위 교차 주제를 반드시 함께 처리하세요.</div>`
    : t.id==='B05'
    ? `<div class="note warn"><b>⚠정본 이원화.</b> 같은 날짜(241226)의 파일이 <b>두 폴더에 다른 ID로</b> 존재합니다. 어느 쪽이 정본인지 확인 후 하나로 통합해야 합니다.</div>`
    : t.id==='C03'
    ? `<div class="note warn"><b>⚠자산 리스크.</b> 이 계열 원본 다수가 <code>kbl0226</code> 계정 소유라 <b>칼선 원본 통제권이 우리 계정 밖</b>입니다. 신규 스티커는 <b>기존 칼선 재사용이 원칙</b>(새 규격은 업체 칼선비 발생).</div>`
    : t.c==='F'
    ? `<div class="note"><b>정본 — 개선 대상이 아니라 보존 대상입니다.</b> 여기를 건드리면 나머지 주제의 기준점이 흔들립니다.</div>`
    : '';

  $('app').innerHTML=`<div class="det" style="padding-top:34px">
    <div class="dhead">
      <span class="id">${t.id} · ${esc(c.name)}</span>
      <div><h3>${esc(t.n)}</h3><div class="d">${esc(t.d)}</div></div>
      <span class="sp"></span>
      <span class="pri ${c.prik}">${esc(c.pri)}</span>
      <a class="backlink" href="#">← 목차</a>
    </div>
    ${xr}${note}${assets}
  </div>`+`<footer><div class="fin"><span>사르르목장 · 디자인 아카이브</span><span class="sp"></span><span>정본 A · <code>#38528a</code></span></div></footer>`;
  bind(); window.scrollTo(0,0);
}

function bind(){
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{ location.hash='#'+b.dataset.go; });
}
function route(){
  const h=(location.hash||'').replace('#','');
  if(h && T(h)) renderTopic(h); else renderIndex();
}
window.addEventListener('hashchange',route);
</script>
</body></html>
