<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>발뮤다 빵 데우기 안내 카드 · 세로 100×150mm · A4 1장</title>
<link href="https://webfont.cafe24.com/css/cafe24ssurround.css" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   사르르목장 · 발뮤다 빵 데우기 안내 카드 (v4 · 최종 · 사장님 수정 반영)
   · 세로 100×150mm · A4 1장 중앙 + 재단선
   · 한글=Sandoll 오동통 (WKWebView/CoreText 렌더 시 정품 · Chrome은 써라운드 폴백)
   · 3번 문구: "MODE 버튼 누르기 / ReBake에 불이 들어와야합니다."
   · 주의=빨강(사장님 선택)
   ══════════════════════════════════════════════════════════════ */
:root{
  --navy:#38528a; --navy-d:#2a3f6e; --navy-l:#8a99bd;
  --green:#3fa855; --red:#e23b34; --line:#e7e2d7; --ink:#33383c;
  --ko:'Sandoll 오동통','Cafe24Ssurround',sans-serif;
  --num:'Sandoll 오동통','Cafe24Ssurround',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#fff}
@page{ size:A4 portrait; margin:0; }

.sheet{
  width:210mm; height:297mm; margin:0 auto; background:#fff; position:relative;
  display:flex; justify-content:center; align-items:center;
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}

/* 재단 유닛 */
.unit{position:relative;width:100mm;height:150mm}
.cut{position:absolute;inset:0;border:.25mm dashed #cfd3d9}
.tick{position:absolute;background:#111}
.tick.h{width:5mm;height:.2mm}.tick.v{width:.2mm;height:5mm}
.t-tl-h{top:0;left:-6mm}.t-tl-v{top:-6mm;left:0}
.t-tr-h{top:0;right:-6mm}.t-tr-v{top:-6mm;right:0}
.t-bl-h{bottom:0;left:-6mm}.t-bl-v{bottom:-6mm;left:0}
.t-br-h{bottom:0;right:-6mm}.t-br-v{bottom:-6mm;right:0}

/* ── 카드 100×150mm ── */
.card{position:absolute;inset:0;overflow:hidden;background:#fff;container-type:size}
.card .in{position:absolute;top:11mm;right:9mm;bottom:10mm;left:9mm;display:flex;flex-direction:column}

.title{font-family:var(--ko);font-size:8.6cqh;line-height:1.06;color:var(--navy);letter-spacing:-.01em}
.subtitle{font-family:var(--ko);font-size:3.6cqh;color:var(--green);margin-top:2.2cqh}

.steps{flex:1;display:flex;flex-direction:column;justify-content:center;gap:3cqh;margin:1cqh 0}
.step{display:grid;grid-template-columns:8mm 1fr;align-items:baseline;column-gap:3.5mm}
.step .no{font-family:var(--num);font-size:5.6cqh;color:var(--navy-l);line-height:1}
.step .tx{font-family:var(--ko);font-size:4.2cqh;color:var(--ink);line-height:1.2}
.step .tx em{font-style:normal;color:var(--green);font-weight:700}
.step .tx .sub{display:block;font-family:var(--ko);font-size:2.9cqh;color:var(--navy-l);margin-top:.6cqh}

.warn{margin-top:1cqh;padding-top:2.4cqh;border-top:.2mm solid var(--line);
  font-family:var(--ko);font-size:2.9cqh;color:var(--navy);line-height:1.3}
.warn .tag{color:var(--red);font-weight:700;margin-right:1.5mm}
.warn b{color:var(--navy-d)}

@media screen{ body{background:#cfd2d8;padding:22px 0} .sheet{box-shadow:0 12px 44px rgba(0,0,0,.22)} }
</style></head>
<body>

<div class="sheet">
  <div class="unit">
    <span class="tick h t-tl-h"></span><span class="tick v t-tl-v"></span>
    <span class="tick h t-tr-h"></span><span class="tick v t-tr-v"></span>
    <span class="tick h t-bl-h"></span><span class="tick v t-bl-v"></span>
    <span class="tick h t-br-h"></span><span class="tick v t-br-v"></span>
    <div class="cut"></div>
    <div class="card"><div class="in">
      <div class="title">식은 빵,<br>데워 드세요</div>
      <div class="subtitle">3분이면 갓 구운 맛으로.</div>

      <div class="steps">
        <div class="step"><span class="no">1</span><span class="tx">오븐 문을 열어요</span></div>
        <div class="step"><span class="no">2</span><span class="tx">호일째 그대로 넣어요</span></div>
        <div class="step"><span class="no">3</span><span class="tx">MODE 버튼 누르기<span class="sub">ReBake에 불이 들어와야합니다.</span></span></div>
        <div class="step"><span class="no">4</span><span class="tx"><em>3분</em> 맞추고 기다려요</span></div>
      </div>

      <div class="warn"><span class="tag">주의</span>사용 중과 직후엔 <b>매우 뜨거워요.</b><br>화상을 조심하세요.</div>
    </div></div>
  </div>
</div>
</body></html>
